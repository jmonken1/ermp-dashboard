/* ─── NAV BUILD ─── */
function buildNav(){
  const nav=document.getElementById('nav');
  TABS.forEach(tab=>{
    const btn=document.createElement('button');
    btn.className='nb'+(tab.cls?' '+tab.cls:'')+(tab.id==='portfolio'?' on':'');
    btn.textContent=tab.label;
    btn.onclick=()=>switchTab(tab.id);
    nav.appendChild(btn);
  });
}

function switchTab(id){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pane-'+id).classList.add('active');
  const idx=TABS.findIndex(t=>t.id===id);
  document.querySelectorAll('.nb')[idx].classList.add('on');
  renderTab(id);
}

const rendered={};
function renderTab(id){
  if(rendered[id]) return;
  rendered[id]=true;
  const pane=document.getElementById('pane-'+id);
  switch(id){
    case 'portfolio':   buildPortfolio(pane); break;
    case 'backtest':    buildBacktest(pane); break;
    case 'scan':        buildScan(pane); break;
    case 'scan-analysis': buildScanAnalysis(pane); break;
    case 'replacements':  buildReplacements(pane); break;
    case 'audit':       buildAudit(pane); break;
    case 'rules':       buildRules(pane); break;
    case 'stress':      buildStress(pane); break;
    case 'monte':       buildMonte(pane); break;
    case 'rebalance':   buildRebalance(pane); break;
    case 'risk':        buildRisk(pane); break;
    case 'instructions': buildInstructions(pane); break;
  }
}

/* ─── HELPERS ─── */
function h(tag,cls,inner,style){return`<${tag}${cls?' class="'+cls+'"':''}${style?' style="'+style+'"':''}>${inner}</${tag}>`;}
function mc(lbl,val,sub,cls){return`<div class="mc${cls?' '+cls:''}">${h('div','ml',lbl)}${h('div','mn',val)}${sub?h('div','ms',sub):''}</div>`;}
function pill(text,cls){return`<span class="pill ${cls}">${text}</span>`;}
function sh(text){return`<div class="sh">${text}</div>`;}
function pct(v){return(v>0?'+':'')+v.toFixed(1)+'%';}
function fmtM(v){return v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'k':'$'+v;}
function compound(rets,s){let v=s;const o=[s];rets.forEach(r=>{v=parseFloat((v*(1+r/100)).toFixed(0));o.push(v);});return o;}

let scanDone=false;
function execScan(){
  if(scanDone){showScanResults();return;}
  const btn=document.getElementById('scan-btn');
  btn.disabled=true;btn.textContent='Scanning...';
  const prog=document.getElementById('scan-prog');
  const status=document.getElementById('scan-status');
  const steps=[
    [12,'Fetching universe — 2,394 eligible equities...',{u:'2,394',f1:'—',f2:'—',q:'—'}],
    [30,'Applying 60-day revision filter...',{u:'2,394',f1:'286',f2:'—',q:'—'}],
    [52,'Running hard signal filters...',{u:'2,394',f1:'286',f2:'97',q:'—'}],
    [74,'Scoring on 100-point composite model...',{u:'2,394',f1:'286',f2:'97',q:'—'}],
    [92,'Applying 20-point premium trigger test...',{u:'2,394',f1:'286',f2:'97',q:'1'}],
    [100,'Scan complete.',{u:'2,394',f1:'286',f2:'97',q:'1'}],
  ];
  let i=0;
  const timer=setInterval(()=>{
    if(i>=steps.length){clearInterval(timer);scanDone=true;btn.disabled=false;btn.textContent='View results ↗';showScanResults();return;}
    const [pct2,msg,counts]=steps[i];
    prog.style.width=pct2+'%';
    status.textContent=msg;
    if(counts.u!=='—')document.getElementById('sc-u').textContent=counts.u;
    if(counts.f1!=='—')document.getElementById('sc-f1').textContent=counts.f1;
    if(counts.f2!=='—')document.getElementById('sc-f2').textContent=counts.f2;
    if(counts.q!=='—')document.getElementById('sc-q').textContent=counts.q;
    i++;
  },420);
}

function updateSim(){
  const r=+document.querySelector('#pane-stress input[value]')?.value||35;
  const inputs=document.querySelectorAll('#pane-stress input[type=range]');
  if(!inputs.length)return;
  const rv=+inputs[0].value,lv=+inputs[1].value,pv=+inputs[2].value,bv=+inputs[3].value;
  document.getElementById('sv-r').textContent=rv;
  document.getElementById('sv-l').textContent=lv;
  document.getElementById('sv-p').textContent=pv;
  document.getElementById('sv-b').textContent=bv;
  const rs=Math.min(rv/75,1),ls=Math.min(lv/90,1),ps=Math.min(Math.max(pv-15,0)/45,1),bs=Math.max(1-bv/75,0);
  const loss=parseFloat((-(rs*0.35+ls*0.25+ps*0.25+bs*0.15)*45).toFixed(1));
  const spxR=parseFloat((loss*0.55).toFixed(1));
  const al=parseFloat((loss-spxR).toFixed(1));
  const rl=loss<-20?'High — 2022 analog':loss<-10?'Elevated — 2018':loss<0?'Moderate':'Low / benign';
  const fmt=v=>(v>0?'+':'')+v.toFixed(1)+'%';
  const so=document.getElementById('sim-out');
  so.innerHTML=`${mc('ERMP est.',fmt(loss),'',loss<-15?'r':loss<0?'a':'g')}${mc('SPX est.',fmt(spxR),'','')}${mc('Risk level',rl,'',loss<-15?'r':loss<-5?'a':'g')}`;
  document.getElementById('sim-narr').textContent=loss<-20?`Severe stress — 2022 analog. Rate velocity ${rv}bps/mo + ${lv}d revision lag + P/E ${pv}x = maximum duration risk. Breadth ${bv}% means overlay ${bv<40?'has fired':'fires rapidly'}.`:loss<-10?`Elevated stress — 2018-style crash. Rate pressure triggers multiple compression before analyst downgrades arrive. Recovery likely 3–6 months if rate velocity moderates.`:loss<0?`Moderate stress. Sell discipline exits weakening names. Overlay provides cushion. Resembles 2015 correction.`:`Benign environment. Low rate velocity, full alpha expected.`;
}
